# Test profile: use in-memory DB so tests don't require local PostgreSQL
spring.datasource.url=jdbc:h2:mem:vitabridge_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Keep JWT values present for context load
jwt.secret=test-secret-key-should-be-at-least-256-bits-long-test-test-test
jwt.expiration=86400000
