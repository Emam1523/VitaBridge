spring.application.name=vitabridge

# App URLs
app.callbackHost=${APP_CALLBACK_HOST:localhost}
app.backendUrl=http://${app.callbackHost}:8080
app.frontendUrl=https://${app.callbackHost}:5173

# #Allowed Origins
# app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:*}
# app.ws.allowed-origin-patterns=${APP_WS_ALLOWED_ORIGIN_PATTERNS:*}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# DataSource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/VitaBridge}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:emamhassan}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:hassan1523}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
jwt.secret=4f3c2a1b5e6f7890a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4
jwt.expiration=86400000

# Server Configuration
server.port=8080
server.address=0.0.0.0
server.error.include-message=always
server.error.include-binding-errors=always

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.vitabridge=INFO

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# Email / SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Display name shown in the "From" header
app.email.from=${MAIL_USERNAME:hassanchowdhury204573@gmail.com}
app.email.fromName=VitaBridge

# Admin inbox for contact-form enquiries
app.email.adminEmail=${ADMIN_EMAIL:hassanchowdhury204573@gmail.com}

# OTP Configuration
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}

# Agora Configuration (Get from https://console.agora.io)
agora.appId=${AGORA_APP_ID:70c810e5cdcb426d869ef82085c4b95f}
agora.appCertificate=${AGORA_APP_CERTIFICATE:}
agora.useToken=${AGORA_USE_TOKEN:false}

# AamarPay Payment Gateway Configuration
aamarpay.storeId=${AAMARPAY_STORE_ID:aamarpaytest}
aamarpay.signatureKey=${AAMARPAY_SIGNATURE_KEY:dbb74894e82415a2f7ff0ec3a97e4183}
aamarpay.paymentUrl=${AAMARPAY_PAYMENT_URL:https://sandbox.aamarpay.com/jsonpost.php}
aamarpay.validationUrl=${AAMARPAY_VALIDATION_URL:https://sandbox.aamarpay.com/api/v1/trxcheck/request.php}
aamarpay.successUrl=${app.backendUrl}/api/payments/aamarpay/success
aamarpay.failUrl=${app.backendUrl}/api/payments/aamarpay/fail
aamarpay.cancelUrl=${app.backendUrl}/api/payments/aamarpay/cancel
aamarpay.frontendRedirectUrl=${app.frontendUrl}
aamarpay.connectTimeoutMs=${AAMARPAY_CONNECT_TIMEOUT_MS:5000}
aamarpay.readTimeoutMs=${AAMARPAY_READ_TIMEOUT_MS:8000}
